<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Bookline</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">Bookline</a>
                <h2>Войти в аккаунт</h2>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                <input type="email" placeholder="Электронная почта" required>
            </div>
            <div class="form-group">
                <input type="password" placeholder="Пароль" required>
            </div>
            <button type="submit" class="auth-submit">Войти</button>
            </form>

            <div class="auth-footer">
                <span>Еще нет аккаунта?</span>
                <a href="profile-registration.html">Зарегистрироваться</a>
            </div>
            <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Останавливаем перезагрузку страницы
        
        // Здесь обычно идет проверка логина/пароля
        // Но для теста просто переходим на страницу аккаунта:
        window.location.href = 'account.html';
    });
</script>
        </div>
    </div>
</body>

</html>
