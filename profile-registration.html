<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Bookline</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">Bookline</a>
                <h2>Создать аккаунт</h2>
                <p>Присоединяйтесь к сообществу читателей</p>
            </div>

            <form class="auth-form">
                <div class="form-group">
                    <input type="text" placeholder="Имя пользователя" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="Электронная почта" required>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="Пароль" required>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="Подтвердите пароль" required>
                </div>

                <button type="submit" class="auth-submit">Зарегистрироваться</button>
            </form>

            <div class="auth-footer">
                <span>Уже есть аккаунт?</span>
                <a href="profile-entrance.html">Войти</a>
            </div>
        </div>
    </div>
</body>

</html>
